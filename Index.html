        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(14px) saturate(180%);

            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); 
            border-radius: 24px; 
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);

        .pillar-card { transition: transform 0.3s ease; }

        .gold-badge {

        }

        .tab-content.active { display: block; }
        .legal-tab-button { transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        .legal-tab-button.active { border-bottom-color: var(--mahogany); color: var(--mahogany); font-weight: 700; }
        
        .dark .legal-tab-button.active { border-bottom-color: var(--accent-color); color: var(--accent-color); }

        .nav-active {

        .section-header { color: var(--mahogany); border-left: 4px solid var(--forest-green); padding-left: 1rem; }

            return GOOGLE_CLOUD_CONFIG.bucketUrl + GOOGLE_CLOUD_CONFIG.imageSubfolder + src;

        async function loadDataFromCloud() {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                setTimeout(() => {
                    const icon = document.getElementById('theme-icon');
                    if (icon) {
                        icon.setAttribute('data-lucide', 'sun');
                        lucide.createIcons();
                    }
                }, 100);
            }
            try {
                const response = await fetch(GOOGLE_CLOUD_CONFIG.jsonUrl, { cache: "no-store" });
                if (!response.ok) throw new Error("Cloud file not found");
                window.breeds = await response.json();
            } catch (error) {
                const stored = localStorage.getItem('classdogs_breeds');
                window.breeds = stored ? JSON.parse(stored) : [];
            }
            const currentHash = window.location.hash.replace('#', '') || 'home';
            window.appNavigate(currentHash);
        }

            contentDiv.innerHTML = '';
            contentDiv.classList.add('slide-in-right');

                            <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-600"><i data-lucide="truck" class="w-8 h-8"></i></div>
                            <h3 class="text-xl font-bold mb-3 dark:text-white">Island-wide Delivery</h3>
                            <p class="text-gray-600 dark:text-gray-400">Safe and comfortable transport across Kenya, from Nairobi to Mombasa.</p>
                        </div>
                    </section>

                    <section>
                        <div class="flex items-end justify-between mb-8">
                            <div>
                                <h2 class="text-3xl font-bold dark:text-white serif">Our Champions</h2>
                                <p class="text-gray-500 mt-2">Elite pedigree dogs that set our standard.</p>
                            </div>
                        </div>
                        <div class="overflow-hidden rounded-3xl" onmouseenter="window.champPaused=true" onmouseleave="window.champPaused=false">
                            <div id="champ-slideshow" class="flex transition-transform duration-1000 ease-in-out">
                                ${window.champions.map(c => `
                                    <div class="flex-shrink-0 w-full px-2">
                                        <div class="relative group cursor-pointer overflow-hidden rounded-2xl aspect-[21/9]">
                                            <img src="${c.url}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent flex flex-col justify-end p-8">
                                                <h4 class="text-2xl font-bold text-white mb-2">${c.title}</h4>
                                                <p class="text-gray-200 text-sm max-w-lg">${c.desc}</p>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>
                </div>
            `;
        }

        function renderBreedCard(breed) {
            const displayPrice = breed.price === "Price on Call" ? breed.price : `KSh ${parseInt(breed.price).toLocaleString()}`;
            return `
                <div class="glass-card group cursor-pointer overflow-hidden flex flex-col h-full" onclick="window.location.hash='details/${breed.id}'">
                    <div class="relative h-64 overflow-hidden">
                        <img src="${window.resolveImageUrl(breed.image)}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                        <div class="absolute top-4 right-4 bg-white/90 dark:bg-slate-800/90 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold text-orange-600 shadow-sm border border-orange-100 dark:border-slate-700">${breed.name}</div>
                    </div>
                    <div class="p-6 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="text-xl font-bold dark:text-white">${breed.name}</h3>
                            <span class="text-lg font-extrabold text-orange-600">${displayPrice}</span>
                        </div>
                        <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-3 mb-6 flex-1">${breed.desc}</p>
                        <div class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-slate-700">
                            <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider flex items-center"><i data-lucide="tag" class="w-3 h-3 mr-1"></i>${breed.age || 'Puppy'}</span>
                            <button class="bg-slate-900 dark:bg-orange-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center group-hover:bg-orange-600 transition">View Details <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBreedDetailsPage(id) {
            const b = window.breeds.find(x => x.id == id);
            if (!b) return '<div class="text-center p-20"><h2 class="text-3xl font-bold dark:text-white">Breed not found</h2><a href="#breeds" class="text-orange-600 mt-4 block">Return to Breeds</a></div>';
            
            const displayPrice = b.price === "Price on Call" ? b.price : `KSh ${parseInt(b.price).toLocaleString()}`;
            const images = b.gallery || [b.image];

            return `
                <div class="max-w-6xl mx-auto space-y-12">
                    <div class="flex flex-col lg:flex-row gap-12">
                        <div class="lg:w-3/5 space-y-4">
                            <div class="rounded-3xl overflow-hidden shadow-2xl glass-card aspect-video">
                                <img id="main-breed-img" src="${window.resolveImageUrl(b.image)}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex gap-4 overflow-x-auto pb-4">
                                ${images.map(img => `
                                    <img src="${window.resolveImageUrl(img)}" class="w-24 h-24 object-cover rounded-xl cursor-pointer hover:opacity-80 transition border-2 border-transparent hover:border-orange-500" onclick="document.getElementById('main-breed-img').src=this.src">
                                `).join('')}
                            </div>
                        </div>
                        <div class="lg:w-2/5 space-y-8">
                            <div>
                                <h2 class="text-4xl font-extrabold dark:text-white serif">${b.name}</h2>
                                <p class="text-3xl font-bold text-orange-600 mt-4">${displayPrice}</p>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700">
                                    <span class="text-xs text-gray-500 uppercase block mb-1">Age</span>
                                    <span class="font-bold dark:text-white">${b.age || 'Available Now'}</span>
                                </div>
                                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-slate-700">
                                    <span class="text-xs text-gray-500 uppercase block mb-1">Vaccinated</span>
                                    <span class="font-bold text-green-600">Yes</span>
                                </div>
                            </div>
                            <div class="p-6 bg-orange-50 dark:bg-slate-800 rounded-3xl space-y-4">
                                <h4 class="font-bold dark:text-white">Interested in this breed?</h4>
                                <div class="space-y-3">
                                    <a href="https://wa.me/254713844025?text=I'm interested in the ${b.name}" target="_blank" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-bold flex items-center justify-center transition shadow-lg"><i data-lucide="message-circle" class="w-5 h-5 mr-2"></i>WhatsApp Us</a>
                                    <a href="tel:+254713844025" class="w-full bg-white dark:bg-slate-700 text-slate-900 dark:text-white border-2 border-slate-200 dark:border-slate-600 py-4 rounded-2xl font-bold flex items-center justify-center transition"><i data-lucide="phone" class="w-5 h-5 mr-2"></i>Call Expert</a>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card p-8 md:p-12">
                        <h3 class="text-2xl font-bold mb-6 dark:text-white serif border-b pb-4 border-gray-100 dark:border-slate-700">About the Breed</h3>
                        <div class="prose prose-orange max-w-none dark:prose-invert">
                            <p class="text-gray-600 dark:text-gray-300 leading-relaxed whitespace-pre-wrap">${b.desc}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAboutPage() {
            return `
                <div class="max-w-4xl mx-auto space-y-12">
                    <section class="text-center space-y-6">
                        <h2 class="text-4xl md:text-5xl font-extrabold serif dark:text-white">About Class Dogs Ltd</h2>
                        <div class="w-24 h-1 bg-orange-500 mx-auto"></div>
                        <p class="text-xl text-gray-600 dark:text-gray-300 leading-relaxed">Dedicated to raising healthy, happy, and purebred companions for families across Kenya.</p>
                    </section>
                    
                    <div class="glass-card p-8 md:p-12 space-y-10">
                        <div class="grid md:grid-cols-2 gap-12 items-center">
                            <div>
                                <h3 class="text-2xl font-bold mb-4 dark:text-white serif">Our Mission</h3>
                                <p class="text-gray-600 dark:text-gray-400">To provide ethical breeding services and connect high-quality purebred puppies with loving forever homes while maintaining transparency and professional standards.</p>
                            </div>
                            <div class="rounded-2xl overflow-hidden shadow-lg"><img src="https://storage.googleapis.com/classdogs.com/Imagegcs/Happyclient01.jpg" class="w-full h-full object-cover"></div>
                        </div>

                        <div class="grid md:grid-cols-2 gap-12 items-center">
                            <div class="order-2 md:order-1 rounded-2xl overflow-hidden shadow-lg"><img src="https://storage.googleapis.com/classdogs.com/Imagegcs/Siri.jpg" class="w-full h-full object-cover"></div>
                            <div class="order-1 md:order-2">
                                <h3 class="text-2xl font-bold mb-4 dark:text-white serif">Our Promise</h3>
                                <ul class="space-y-4">
                                    <li class="flex items-start text-gray-600 dark:text-gray-400"><i data-lucide="check-circle" class="w-5 h-5 text-orange-500 mr-3 mt-1 shrink-0"></i>EAKC Registration for parent dogs.</li>
                                    <li class="flex items-start text-gray-600 dark:text-gray-400"><i data-lucide="check-circle" class="w-5 h-5 text-orange-500 mr-3 mt-1 shrink-0"></i>Comprehensive vet history for every puppy.</li>
                                    <li class="flex items-start text-gray-600 dark:text-gray-400"><i data-lucide="check-circle" class="w-5 h-5 text-orange-500 mr-3 mt-1 shrink-0"></i>Lifetime guidance for new pet owners.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLegalPage() {
            return `
                <div class="max-w-4xl mx-auto space-y-8">
                    <h2 class="text-3xl md:text-4xl font-extrabold serif text-center dark:text-white">Legal Information</h2>
                    <div class="glass-card overflow-hidden">
                        <div class="flex border-b border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-900">
                            <button onclick="window.openLegalTab(event, 'terms')" class="legal-tab-button active px-6 py-4 text-sm font-bold uppercase tracking-wider">Terms & Conditions</button>
                            <button onclick="window.openLegalTab(event, 'privacy')" class="legal-tab-button px-6 py-4 text-sm font-bold uppercase tracking-wider">Privacy Policy</button>
                            <button onclick="window.openLegalTab(event, 'refund')" class="legal-tab-button px-6 py-4 text-sm font-bold uppercase tracking-wider">Refund Policy</button>
                        </div>
                        <div class="p-8 md:p-12 min-h-[400px]">
                            <div id="terms" class="tab-content active space-y-6">
                                <h3 class="text-xl font-bold dark:text-white">General Terms</h3>
                                <p class="text-gray-600 dark:text-gray-400 leading-relaxed">By engaging with Class Dogs Ltd, you agree to provide a safe and healthy environment for your new pet. We reserve the right to refuse service to any individual we deem unsuitable for pet ownership.</p>
                                <ul class="list-disc pl-6 space-y-2 text-gray-600 dark:text-gray-400">
                                    <li>Pricing is subject to change based on breed and pedigree.</li>
                                    <li>Ownership is transferred only upon full payment and signing of the sales agreement.</li>
                                    <li>Puppies must be at least 8 weeks old before delivery.</li>
                                </ul>
                            </div>
                            <div id="privacy" class="tab-content space-y-6">
                                <h3 class="text-xl font-bold dark:text-white">Privacy Policy</h3>
                                <p class="text-gray-600 dark:text-gray-400 leading-relaxed">We value your privacy. Your personal information is used solely for the purpose of the adoption process and legal documentation required for dog ownership transfer.</p>
                            </div>
                            <div id="refund" class="tab-content space-y-6">
                                <h3 class="text-xl font-bold dark:text-white">Refund & Return Policy</h3>
                                <p class="text-gray-600 dark:text-gray-400 leading-relaxed">Due to the biological nature of our pets, returns are only accepted within 48 hours if a licensed veterinarian finds a pre-existing life-threatening condition. Deposit refunds are subject to our reservation terms.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdminPage() {
            if (!window.isAdminAuthenticated) {
                return `
                    <div class="max-w-md mx-auto glass-card p-10 text-center space-y-6 mt-12">
                        <div class="w-16 h-16 bg-slate-900 dark:bg-orange-600 rounded-2xl flex items-center justify-center mx-auto text-white"><i data-lucide="lock" class="w-8 h-8"></i></div>
                        <h2 class="text-2xl font-bold dark:text-white">Admin Authentication</h2>
                        <div class="space-y-4">
                            <input type="email" id="admin-email" placeholder="Admin Email" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                            <input type="password" id="admin-pass" placeholder="Password" class="w-full p-4 rounded-xl border dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                            <button onclick="window.authenticateAdmin()" class="w-full bg-slate-900 dark:bg-orange-600 text-white py-4 rounded-xl font-bold transition hover:bg-black">Login to Dashboard</button>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="space-y-8">
                    <div class="flex justify-between items-center">
                        <h2 class="text-3xl font-bold dark:text-white serif">Breeds Dashboard</h2>
                        <button onclick="window.showBreedForm()" class="bg-orange-600 text-white px-6 py-3 rounded-xl font-bold flex items-center shadow-lg"><i data-lucide="plus" class="w-5 h-5 mr-2"></i>Add New Breed</button>
                    </div>
                    
                    <div class="glass-card overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 dark:bg-slate-900 border-b dark:border-slate-700">
                                <tr>
                                    <th class="p-6 text-xs font-bold uppercase tracking-wider dark:text-gray-400">Breed</th>
                                    <th class="p-6 text-xs font-bold uppercase tracking-wider dark:text-gray-400">Price</th>
                                    <th class="p-6 text-xs font-bold uppercase tracking-wider dark:text-gray-400">Status</th>
                                    <th class="p-6 text-xs font-bold uppercase tracking-wider dark:text-gray-400">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y dark:divide-slate-700">
                                ${window.breeds.map(b => `
                                    <tr class="hover:bg-gray-50 dark:hover:bg-slate-800 transition">
                                        <td class="p-6">
                                            <div class="flex items-center">
                                                <img src="${window.resolveImageUrl(b.image)}" class="w-12 h-12 rounded-lg object-cover mr-4">
                                                <span class="font-bold dark:text-white">${b.name}</span>
                                            </div>
                                        </td>
                                        <td class="p-6 dark:text-gray-300">KSh ${b.price}</td>
                                        <td class="p-6"><span class="px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-bold">Active</span></td>
                                        <td class="p-6">
                                            <div class="flex space-x-3">
                                                <button onclick="window.editBreed('${b.id}')" class="text-blue-600 hover:text-blue-800"><i data-lucide="edit-2" class="w-5 h-5"></i></button>
                                                <button onclick="window.deleteBreed('${b.id}')" class="text-red-600 hover:text-red-800"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        window.authenticateAdmin = () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-pass').value;
            if (email === GOOGLE_CLOUD_CONFIG.adminEmail && pass === GOOGLE_CLOUD_CONFIG.adminPassword) {
                window.isAdminAuthenticated = true;
                window.appNavigate('admin');
            } else {
                window.showModal('Access Denied', 'Invalid credentials provided. Please check your admin details.');
            }
        };

        window.showModal = (title, body) => {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => document.getElementById('modal-content').classList.remove('opacity-0'), 10);
        };

        window.closeModal = () => document.getElementById('custom-modal').classList.add('hidden');

        window.startGallerySlideshow = () => {
            const slideshow = document.getElementById('gallery-slideshow');
            if (!slideshow) return;
            let current = 0;
            const items = slideshow.children.length;
            slideshow.style.width = `${items * 100}%`;
            Array.from(slideshow.children).forEach(child => child.style.width = `${100 / items}%`);
            window.changeGallerySlide = (dir) => {
                current = (current + dir + items) % items;
                slideshow.style.transform = `translateX(-${current * (100 / items)}%)`;
            };
            if(window.galInt) clearInterval(window.galInt);
            window.galInt = setInterval(() => { if(!window.galleryPaused) window.changeGallerySlide(1); }, 4000);
        };

        window.startChampionSlideshow = () => {
            const slideshow = document.getElementById('champ-slideshow');
            if (!slideshow) return;
            let current = 0;
            const items = slideshow.children.length;
            slideshow.style.width = `${items * 100}%`;
            Array.from(slideshow.children).forEach(child => child.style.width = `${100 / items}%`);
            window.changeChampSlide = (dir) => {
                current = (current + dir + items) % items;
                slideshow.style.transform = `translateX(-${current * (100 / items)}%)`;
            };
            if(window.champInt) clearInterval(window.champInt);
            window.champInt = setInterval(() => { if(!window.champPaused) window.changeChampSlide(1); }, 6000);
        };

        window.openLegalTab = (evt, name) => {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.legal-tab-button').forEach(tb => tb.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
        };

        window.handleLogoClick = () => { if(++window.logoClicks >= 5) document.getElementById('nav-admin-btn').classList.remove('hidden'); };

        window.addEventListener('hashchange', () => {
            const currentHash = window.location.hash.replace('#', '') || 'home';
            window.appNavigate(currentHash);
        });

        window.onload = loadDataFromCloud;
    </script>
</body>
</html>
