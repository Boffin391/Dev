            }

            contentDiv.classList.remove('slide-in-right');

            // Route Handler
            if (parts[0] === 'details' && parts.length === 2) {

        // Admin Functionality
        function renderAdminAuth() {
            return `
                <div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10">
                    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Admin Access</h2>

                        <div>

                            <input type="email" id="admin-email" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none text-sm">

                        <div>

                            <input type="password" id="admin-password" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none text-sm">

                            Login to Dashboard
                        </button>
                    </div>
                </div>
            `;
        }

        window.handleAdminLogin = () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-password').value;
            if (email === GOOGLE_CLOUD_CONFIG.adminEmail && pass === GOOGLE_CLOUD_CONFIG.adminPassword) {
                window.isAdminAuthenticated = true;
                window.appNavigate('admin');
            } else {
                window.showModal("Login Failed", "Incorrect credentials provided. Access denied.");
            }
        };

        function renderAdminPanel() {
            const contentDiv = document.getElementById('main-content');
            contentDiv.innerHTML = `
                <div class="max-w-4xl mx-auto px-2">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <h2 class="text-2xl md:text-3xl font-bold">Admin Dashboard</h2>
                        <div class="flex gap-2">
                            <button onclick="window.renderAddBreedForm()" class="bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center">
                                <i data-lucide="plus" class="w-4 h-4 mr-1"></i> Add New Breed
                            </button>
                            <button onclick="window.downloadBreedsJSON()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-xs flex items-center">
                                <i data-lucide="download" class="w-4 h-4 mr-1"></i> Download JSON
                            </button>
                        </div>
                    </div>
                    
                    <div id="admin-breeds-list" class="space-y-4">
                        </div>
                </div>
            `;
            renderAdminBreedsList();
        }

        function renderAdminBreedsList() {
            const container = document.getElementById('admin-breeds-list');
            if (window.breeds.length === 0) {
                container.innerHTML = '<p class="text-center text-sm text-gray-500 py-10 bg-white rounded-xl">No breeds currently in database.</p>';
                return;
            }

            container.innerHTML = window.breeds.map(b => `
                <div class="bg-white p-4 rounded-xl shadow border border-gray-100 flex justify-between items-center hover:shadow-md transition">
                    <div class="flex items-center">
                        <img src="${window.resolveImageUrl(b.images[0])}" class="w-12 h-12 rounded-lg object-cover mr-4">
                        <div>
                            <p class="font-bold text-sm text-gray-800">${b.breed}</p>
                            <p class="text-xs text-gray-500">KES ${b.price.toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.editBreed(${b.id})" class="text-blue-500 p-2 hover:bg-blue-50 rounded-lg transition"><i data-lucide="edit" class="w-5 h-5"></i></button>
                        <button onclick="window.deleteBreed(${b.id})" class="text-red-500 p-2 hover:bg-red-50 rounded-lg transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // CRUD Operations
        window.renderAddBreedForm = () => {
            const contentDiv = document.getElementById('main-content');
            contentDiv.innerHTML = `
                <div class="max-w-2xl mx-auto bg-white p-6 md:p-10 rounded-2xl shadow-xl">
                    <h2 class="text-2xl font-bold mb-6">Add New Puppy Breed</h2>
                    <form id="breed-form" class="space-y-4" onsubmit="window.saveBreed(event)">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">BREED NAME</label>
                                <select id="form-breed-name" class="w-full p-3 border rounded-lg text-sm" required>
                                    ${WORLD_BREEDS.map(name => `<option value="${name}">${name}</option>`).join('')}

                            </div>
                            <div>

                                <input type="number" id="form-price" class="w-full p-3 border rounded-lg text-sm" required>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-4">
                            <div><label class="block text-xs font-bold text-gray-500 mb-1">AGE</label><input type="text" id="form-age" placeholder="e.g. 2 months" class="w-full p-3 border rounded-lg text-sm"></div>
                            <div><label class="block text-xs font-bold text-gray-500 mb-1">GENDER</label><select id="form-gender" class="w-full p-3 border rounded-lg text-sm"><option value="Male">Male</option><option value="Female">Female</option><option value="Both Available">Both Available</option></select></div>
                            <div><label class="block text-xs font-bold text-gray-500 mb-1">PURITY</label><input type="text" id="form-purity" value="Purebred" class="w-full p-3 border rounded-lg text-sm"></div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">DESCRIPTION</label>
                            <textarea id="form-description" rows="3" class="w-full p-3 border rounded-lg text-sm" required></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">IMAGE NAMES (comma separated, e.g. dog1.jpg, dog2.jpg)</label>
                            <input type="text" id="form-images" class="w-full p-3 border rounded-lg text-sm" required>
                        </div>
                        <div class="flex gap-3 pt-4">
                            <button type="submit" class="flex-1 bg-green-600 text-white font-bold py-3 rounded-lg">Save Breed</button>
                            <button type="button" onclick="window.appNavigate('admin')" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 rounded-lg">Cancel</button>
                        </div>
                    </form>
                </div>
            `;
        };

        window.saveBreed = (e) => {
            e.preventDefault();
            const newBreed = {
                id: Date.now(),
                breed: document.getElementById('form-breed-name').value,
                price: parseInt(document.getElementById('form-price').value),
                age: document.getElementById('form-age').value,
                gender: document.getElementById('form-gender').value,
                purity: document.getElementById('form-purity').value,
                description: document.getElementById('form-description').value,
                images: document.getElementById('form-images').value.split(',').map(s => s.trim())
            };
            window.breeds.unshift(newBreed);
            localStorage.setItem('classdogs_breeds', JSON.stringify(window.breeds));
            window.showModal("Success!", "New breed added successfully. Remember to download and upload the updated JSON.");
            window.appNavigate('admin');
        };

        window.deleteBreed = (id) => {
            if(confirm("Are you sure you want to delete this breed?")) {
                window.breeds = window.breeds.filter(b => b.id !== id);
                localStorage.setItem('classdogs_breeds', JSON.stringify(window.breeds));
                renderAdminBreedsList();
            }
        };

        window.downloadBreedsJSON = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.breeds, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "breed.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        // Modal Helpers
        window.showModal = (title, body) => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closeModal = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        };

        // Slideshow Logics
        window.changeGallerySlide = (dir) => { /* logic injected by startGallerySlideshow */ };
        window.startGallerySlideshow = () => {
            const slideshow = document.getElementById('gallery-slideshow');
            if (!slideshow) return;
            let current = 0;
            const items = slideshow.children.length;
            slideshow.style.width = `${items * 100}%`;
            Array.from(slideshow.children).forEach(child => child.style.width = `${100 / items}%`);

            window.changeGallerySlide = (dir) => {
                current = (current + dir + items) % items;
                slideshow.style.transform = `translateX(-${current * (100 / items)}%)`;
            };

            if(window.galInt) clearInterval(window.galInt);
            window.galInt = setInterval(() => {
                if(!window.galleryPaused) window.changeGallerySlide(1);
            }, 4000);
        };

        window.changeChampSlide = (dir) => { /* logic injected by startChampionSlideshow */ };
        window.startChampionSlideshow = () => {
            const slideshow = document.getElementById('champ-slideshow');
            if (!slideshow) return;
            let current = 0;
            const items = slideshow.children.length;
            slideshow.style.width = `${items * 100}%`;
            Array.from(slideshow.children).forEach(child => child.style.width = `${100 / items}%`);

            window.changeChampSlide = (dir) => {
                current = (current + dir + items) % items;
                slideshow.style.transform = `translateX(-${current * (100 / items)}%)`;
            };

            if(window.champInt) clearInterval(window.champInt);
            window.champInt = setInterval(() => {
                if(!window.champPaused) window.changeChampSlide(1);
            }, 6000);
        };

        // Tabs Logic
        window.openLegalTab = (evt, name) => {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.legal-tab-button').forEach(tb => tb.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
        };

        // Admin Secret Trigger
        window.handleLogoClick = () => {
            window.logoClicks++;
            if (window.logoClicks >= GOOGLE_CLOUD_CONFIG.logoClickCountTrigger) {
                document.getElementById('nav-admin-btn').classList.remove('hidden');
            }
        };

        // Initialize App
        window.addEventListener('hashchange', () => {
            const currentHash = window.location.hash.replace('#', '') || 'home';
            window.appNavigate(currentHash);
        });

        window.onload = loadDataFromCloud;
    </script>
