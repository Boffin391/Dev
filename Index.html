        :root {

            --mahogany: #4A0E0E;
            --forest-green: #0B3D0B;
            --warm-gold: #d4af37;
            --soft-cream: #fdfaf5;
        }

        html, body { height: 100%; margin: 0; transition: background-color 0.3s ease; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--secondary-color); 
            overflow-x: hidden;

            flex-direction: column;

        .serif { font-family: 'Cormorant Garamond', serif; }

        @keyframes slideInRight { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        
        /* Refined Glassmorphism */
        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(14px) saturate(180%); 
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07); 
            border-radius: 24px; 
        }

        .dark .glass-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .pillar-card { transition: transform 0.3s ease; }
        .pillar-card:hover { transform: translateY(-5px); }
        
        .gold-badge {
            background: linear-gradient(135deg, #d4af37 0%, #f1d37e 100%);
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; color: white; font-weight: bold; font-size: 0.7rem;
            position: absolute; top: -40px; right: 20px; z-index: 10;
        }
        @media (min-width: 768px) {
            .gold-badge { width: 100px; height: 100px; top: -50px; font-size: 0.8rem; }
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .legal-tab-button { transition: all 0.3s ease; border-bottom: 3px solid transparent; }
        .legal-tab-button.active { border-bottom-color: var(--mahogany); color: var(--mahogany); font-weight: 700; }
        
        .dark .legal-tab-button.active { border-bottom-color: var(--accent-color); color: var(--accent-color); }

        .nav-active {
            color: var(--primary-color) !important;
            font-weight: 800 !important;
            border-bottom: 2px solid var(--primary-color);
        }

        img { content-visibility: auto; }
        .slideshow-container { aspect-ratio: 16 / 9; }
        @media (max-width: 640px) { .slideshow-container { aspect-ratio: 4 / 3; } }

        .section-header { color: var(--mahogany); border-left: 4px solid var(--forest-green); padding-left: 1rem; }
        .dark .section-header { color: var(--accent-color); border-left-color: var(--warm-gold); }
        .custom-bullet li::before { content: "•"; color: var(--forest-green); font-weight: bold; display: inline-block; width: 1em; margin-left: -1em; }
        .dark .custom-bullet li::before { color: var(--accent-color); }
    </style>

        window.toggleDarkMode = () => {
            const html = document.documentElement;

            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.setAttribute('data-lucide', 'moon');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.setAttribute('data-lucide', 'sun');
                localStorage.setItem('theme', 'dark');
            }
            lucide.createIcons();
        };

        window.resolveImageUrl = (src) => {
            if (!src) return "https://placehold.co/800x600/CCCCCC/666666?text=No+Image";
            if (src.startsWith('http') || src.startsWith('data:')) return src;
            return GOOGLE_CLOUD_CONFIG.bucketUrl + GOOGLE_CLOUD_CONFIG.imageSubfolder + src;
        };

        async function loadDataFromCloud() {
            if (localStorage.getItem('theme') === 'dark') {
                document.documentElement.classList.add('dark');
                setTimeout(() => {
                    const icon = document.getElementById('theme-icon');
                    if (icon) { icon.setAttribute('data-lucide', 'sun'); lucide.createIcons(); }
                }, 100);
            }

            try {
                const response = await fetch(GOOGLE_CLOUD_CONFIG.jsonUrl, { cache: "no-store" });
                if (!response.ok) throw new Error("Cloud file not found");
                window.breeds = await response.json();
            } catch (error) {
                const stored = localStorage.getItem('classdogs_breeds');
                window.breeds = stored ? JSON.parse(stored) : [];
            }
            const currentHash = window.location.hash.replace('#', '') || 'home';
            window.appNavigate(currentHash);
        }

        window.appNavigate = (view) => {
            const contentDiv = document.getElementById('main-content');
            const parts = view.split('/');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('nav-active');
                if (btn.getAttribute('href') === `#${parts[0]}`) {
                    btn.classList.add('nav-active');
                }
            });

            contentDiv.innerHTML = '';
            contentDiv.classList.add('slide-in-right');

            if (parts[0] === 'details' && parts.length === 2) {
                contentDiv.innerHTML = renderBreedDetailsPage(parts[1]);
            } else {
                switch (parts[0]) {
                    case 'home': contentDiv.innerHTML = renderHomePage(); window.startGallerySlideshow(); break;
                    case 'breeds': contentDiv.innerHTML = '<h2 class="text-2xl md:text-3xl font-extrabold mb-8 text-center dark:text-white">Available Breeds</h2><div id="breeds-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>'; renderBreedsPage(); break;

                    case 'legal': contentDiv.innerHTML = renderLegalPage(); break;
                    case 'admin': window.isAdminAuthenticated ? renderAdminPanel() : contentDiv.innerHTML = renderAdminAuth(); break;

            }
            lucide.createIcons();
            window.scrollTo(0,0);
        };

        }

        function renderBreedDetailsPage(breedId) {
            const breed = window.breeds.find(b => b.id == breedId);
            if (!breed) return `<div class="text-center py-20 dark:text-white">Breed not found.</div>`;
            
            const statusColor = breed.status === 'Sold' ? 'text-red-500 bg-red-50' : breed.status === 'Reserved' ? 'text-amber-600 bg-amber-50' : 'text-green-600 bg-green-50';
            
            return `
                <div class="max-w-5xl mx-auto bg-white dark:bg-slate-800 rounded-2xl md:rounded-3xl shadow-2xl overflow-hidden mb-12">
                    <div class="grid md:grid-cols-2 gap-6 md:gap-8 p-4 md:p-10">
                        <div class="space-y-4">
                            <div class="h-64 md:h-96 rounded-2xl overflow-hidden shadow-lg relative">
                                <span class="absolute top-4 left-4 z-10 text-xs uppercase font-bold px-3 py-1 rounded-full ${statusColor}">${breed.status || 'Available'}</span>
                                <img id="main-detail-img" src="${window.resolveImageUrl(breed.images[0])}" class="w-full h-full object-cover">
                            </div>
                            <div class="flex space-x-2 overflow-x-auto pb-2">
                                ${breed.images.map(img => `<img src="${window.resolveImageUrl(img)}" loading="lazy" onclick="document.getElementById('main-detail-img').src=this.src" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-lg cursor-pointer border-2 border-transparent hover:border-orange-500">`).join('')}
                            </div>
                        </div>
                        <div class="flex flex-col">
                            <h2 class="text-2xl md:text-4xl font-extrabold text-gray-800 dark:text-white mb-2 md:mb-4">${breed.breed}</h2>
                            <p class="text-xl md:text-2xl font-bold text-orange-600 dark:text-orange-400 mb-6">KES ${breed.price.toLocaleString()}</p>
                            <div class="grid grid-cols-3 gap-2 md:gap-4 mb-8">
                                <div class="bg-gray-50 dark:bg-slate-700 p-2 md:p-3 rounded-xl text-center"><p class="text-[10px] md:text-xs font-bold text-gray-500 dark:text-gray-400">AGE</p><p class="text-xs md:text-sm font-bold text-gray-800 dark:text-gray-200">${breed.age || 'Puppy'}</p></div>
                                <div class="bg-gray-50 dark:bg-slate-700 p-2 md:p-3 rounded-xl text-center"><p class="text-[10px] md:text-xs font-bold text-gray-500 dark:text-gray-400">GENDER</p><p class="text-xs md:text-sm font-bold text-gray-800 dark:text-gray-200">${breed.gender || 'Any'}</p></div>
                                <div class="bg-gray-50 dark:bg-slate-700 p-2 md:p-3 rounded-xl text-center"><p class="text-[10px] md:text-xs font-bold text-gray-500 dark:text-gray-400">PURITY</p><p class="text-xs md:text-sm font-bold text-gray-800 dark:text-gray-200">${breed.purity || 'Purebred'}</p></div>
                            </div>
                            <div class="mb-8"><h4 class="font-bold text-gray-800 dark:text-white mb-2 border-b dark:border-slate-700 pb-2 text-sm md:text-base">Description</h4><p class="text-xs md:text-sm text-gray-600 dark:text-gray-400 leading-relaxed">${breed.description}</p></div>
                            ${breed.status !== 'Sold' ? `<a href="https://wa.me/254713844025?text=I%20am%20interested%20in%20the%20${encodeURIComponent(breed.breed)}" target="_blank" rel="noopener noreferrer" class="mt-auto bg-green-600 text-white font-bold py-3 md:py-4 rounded-2xl flex items-center justify-center transition hover:scale-[1.02] shadow-xl text-sm md:text-base"><i data-lucide="message-circle" class="w-5 h-5 md:w-6 md:h-6 mr-3"></i>Buy via WhatsApp</a>` : `<div class="mt-auto py-3 md:py-4 bg-gray-200 dark:bg-slate-700 text-gray-500 text-center font-bold rounded-2xl cursor-not-allowed">Breed Sold</div>`}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAboutPage() {
            return `
                <div class="max-w-6xl mx-auto py-10 md:py-20">
                    <div class="text-center mb-16">
                        <h2 class="serif text-5xl md:text-8xl text-[var(--mahogany)] dark:text-orange-500">ClassDogs</h2>
                        <p class="serif italic text-2xl text-[var(--warm-gold)] uppercase">Pedigree Authenticity</p>
                    </div>
                    <div class="glass-card p-8 md:p-20 mx-4">
                        <div class="gold-badge shadow-2xl"><span>5 Years<br>Growth</span></div>
                        <h3 class="serif text-3xl text-[var(--forest-green)] dark:text-emerald-400 mb-6">Our Journey</h3>
                        <p class="text-gray-700 dark:text-gray-300">Located in Kahawa Sukari, we connect healthy puppies with loving families.</p>
                    </div>
                </div>
            `;
        }

        function renderLegalPage() {
            return `
                <div class="max-w-4xl mx-auto py-10 px-4">
                    <h2 class="serif text-4xl font-bold mb-8 text-[var(--mahogany)] dark:text-orange-500 text-center">Legal Hub</h2>
                    <div class="bg-white dark:bg-slate-800 p-8 rounded-xl shadow-lg border-t-4 border-emerald-900">
                        <h3 class="text-2xl font-bold mb-4 dark:text-white">Terms & Conditions</h3>
                        <p class="text-gray-600 dark:text-gray-400">Ownership follows the Prevention of Cruelty to Animals Act (Cap 360).</p>
                    </div>
                </div>
            `;
        }

        function renderAdminAuth() {
            return `
                <div class="max-w-md mx-auto bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl mt-10">
                    <h2 class="text-2xl font-bold mb-6 text-center dark:text-white">Admin Access</h2>
                    <input type="email" id="admin-email" placeholder="Email" class="w-full p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg mb-4 text-sm">
                    <input type="password" id="admin-password" placeholder="Password" class="w-full p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg mb-6 text-sm">
                    <button onclick="window.handleAdminLogin()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-lg hover:bg-orange-700 transition">Login</button>
                </div>
            `;
        }

        window.handleAdminLogin = () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-password').value;
            if (email === GOOGLE_CLOUD_CONFIG.adminEmail && pass === GOOGLE_CLOUD_CONFIG.adminPassword) {
                window.isAdminAuthenticated = true;
                window.appNavigate('admin');
            } else {
                window.showModal("Login Failed", "Incorrect credentials.");
            }
        };

        function renderAdminPanel() {
            const contentDiv = document.getElementById('main-content');
            contentDiv.innerHTML = `
                <div class="max-w-4xl mx-auto">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-bold dark:text-white">Admin Panel</h2>
                        <button onclick="window.downloadBreedsJSON()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs">Download JSON</button>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-lg border-t-4 border-orange-500 mb-8">
                        <form id="add-breed-form" class="space-y-4">
                            <select id="b-name" class="w-full p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                                ${WORLD_BREEDS.map(breed => `<option value="${breed}">${breed}</option>`).join('')}
                            </select>
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="b-price" placeholder="Price (KES)" class="p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                                <select id="b-status" class="p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                                    <option value="Available">Available</option>
                                    <option value="Reserved">Reserved</option>
                                    <option value="Sold">Sold</option>
                                </select>
                            </div>
                            <textarea id="b-desc" placeholder="Description" class="w-full p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg h-32 text-sm"></textarea>
                            <input type="text" class="b-img-url w-full p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm" placeholder="Image URL">
                            <button type="button" onclick="window.saveNewBreed()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg text-sm">Save Listing</button>
                        </form>
                    </div>
                </div>
            `;
        }

        window.saveNewBreed = () => {
            const newBreed = {
                id: Date.now(),
                breed: document.getElementById('b-name').value,
                price: parseInt(document.getElementById('b-price').value),
                description: document.getElementById('b-desc').value,
                status: document.getElementById('b-status').value,
                images: [document.querySelector('.b-img-url').value]
            };
            window.breeds.push(newBreed);
            localStorage.setItem('classdogs_breeds', JSON.stringify(window.breeds));
            window.showModal("Success", "Listing saved locally.");
            renderAdminPanel();
        };

        window.downloadBreedsJSON = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.breeds, null, 2));
            const dl = document.createElement('a'); dl.href = dataStr; dl.download = "breed.json"; dl.click();
        };

        window.showModal = (title, body) => {
            const modal = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => document.getElementById('modal-content').classList.remove('opacity-0'), 10);
        };

        window.closeModal = () => document.getElementById('custom-modal').classList.add('hidden');

        window.startGallerySlideshow = () => {
            const slideshow = document.getElementById('gallery-slideshow');
            if (!slideshow) return;
            let current = 0;
            const items = slideshow.children.length;
            slideshow.style.width = `${items * 100}%`;
            Array.from(slideshow.children).forEach(child => child.style.width = `${100 / items}%`);
            window.changeGallerySlide = (dir) => {
                current = (current + dir + items) % items;
                slideshow.style.transform = `translateX(-${current * (100 / items)}%)`;
            };
            setInterval(() => { if(!window.galleryPaused) window.changeGallerySlide(1); }, 4000);
        };

        window.handleLogoClick = () => { if(++window.logoClicks >= 5) document.getElementById('nav-admin-btn').classList.remove('hidden'); };

        window.addEventListener('hashchange', () => window.appNavigate(window.location.hash.replace('#', '') || 'home'));
        window.onload = loadDataFromCloud;
    </script>
</body>
</html>
