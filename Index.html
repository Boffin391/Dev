        .glass-card {

        async function loadDataFromCloud() {
            if (localStorage.getItem('theme') === 'dark') {

                setTimeout(() => {
                    const icon = document.getElementById('theme-icon');
                    if (icon) { icon.setAttribute('data-lucide', 'sun'); lucide.createIcons(); }

            try {
                const response = await fetch(GOOGLE_CLOUD_CONFIG.jsonUrl, { cache: "no-store" });

                window.breeds = await response.json();

                const stored = localStorage.getItem('classdogs_breeds');

            window.appNavigate(currentHash);

                            <p class="text-xl md:text-2xl font-bold text-orange-600 dark:text-orange-400 mb-6">KES ${breed.price.toLocaleString()}</p>
                            <div class="grid grid-cols-3 gap-2 md:gap-4 mb-8">
                                <div class="bg-gray-50 dark:bg-slate-700 p-2 md:p-3 rounded-xl text-center"><p class="text-[10px] md:text-xs font-bold text-gray-500 dark:text-gray-400">AGE</p><p class="text-xs md:text-sm font-bold text-gray-800 dark:text-gray-200">${breed.age || 'Puppy'}</p></div>
                                <div class="bg-gray-50 dark:bg-slate-700 p-2 md:p-3 rounded-xl text-center"><p class="text-[10px] md:text-xs font-bold text-gray-500 dark:text-gray-400">GENDER</p><p class="text-xs md:text-sm font-bold text-gray-800 dark:text-gray-200">${breed.gender || 'Any'}</p></div>
                                <div class="bg-gray-50 dark:bg-slate-700 p-2 md:p-3 rounded-xl text-center"><p class="text-[10px] md:text-xs font-bold text-gray-500 dark:text-gray-400">PURITY</p><p class="text-xs md:text-sm font-bold text-gray-800 dark:text-gray-200">${breed.purity || 'Purebred'}</p></div>

                            ${breed.status !== 'Sold' ? `<a href="https://wa.me/254713844025?text=I%20am%20interested%20in%20the%20${encodeURIComponent(breed.breed)}" target="_blank" rel="noopener noreferrer" class="mt-auto bg-green-600 text-white font-bold py-3 md:py-4 rounded-2xl flex items-center justify-center transition hover:scale-[1.02] shadow-xl text-sm md:text-base"><i data-lucide="message-circle" class="w-5 h-5 md:w-6 md:h-6 mr-3"></i>Buy via WhatsApp</a>` : `<div class="mt-auto py-3 md:py-4 bg-gray-200 dark:bg-slate-700 text-gray-500 text-center font-bold rounded-2xl cursor-not-allowed">Breed Sold</div>`}

        function renderAboutPage() {
            return `
                <div class="max-w-6xl mx-auto relative py-10 md:py-20">
                    <div class="text-center mb-16 md:mb-24">
                        <h2 class="serif text-5xl md:text-8xl text-[var(--mahogany)] dark:text-orange-500 mb-4 md:mb-6 animate-fade-in">ClassDogs</h2>
                        <p class="serif italic text-2xl md:text-3xl text-[var(--warm-gold)] tracking-widest uppercase">Pedigree Authenticity</p>
                        <div class="w-24 md:w-40 h-1 bg-[var(--warm-gold)] mx-auto mt-8 md:mt-10 rounded-full opacity-50"></div>
                    </div>

                    <div class="glass-card p-8 md:p-20 relative mb-20 mx-4">
                        <div class="gold-badge shadow-2xl">
                            <span class="leading-tight uppercase tracking-tighter">5 Years<br>of Growth</span>
                        </div>
                        <div class="grid md:grid-cols-2 gap-12 md:gap-20 items-center">

                                <h3 class="serif text-3xl md:text-4xl text-[var(--forest-green)] dark:text-emerald-400 leading-tight">Our Journey in Kahawa Sukari</h3>
                                <p class="text-base md:text-lg text-gray-700 dark:text-gray-300 leading-relaxed font-light">
                                    For five years, ClassDogs has been dedicated to the art of exceptional breeding. Located in the heart of Kahawa Sukari, we bridge the gap between reputable breeders and loving families. Our legacy is built on the health and happiness of every puppy we place.
                                </p>
                            </div>
                            <div class="bg-[var(--forest-green)] p-10 md:p-16 rounded-[40px] text-white shadow-inner transform rotate-1">
                                <p class="serif italic text-2xl md:text-3xl leading-relaxed opacity-90">
                                    "The breeding of dogs must be based on the principle that the health, temperament, and welfare of the dogs are primary, and that morphological characteristics must not compromise health."
                                </p>
                            </div>
                        </div>
                    </div>

                    <div class="grid md:grid-cols-3 gap-8 md:gap-12 px-4">
                        <div class="pillar-card bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700 text-center">
                            <div class="w-16 h-16 bg-orange-50 dark:bg-orange-900/30 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="shield-check" class="text-orange-600 w-8 h-8"></i>
                            </div>
                            <h4 class="serif text-2xl mb-4 text-[var(--mahogany)] dark:text-orange-400">Health Guaranteed</h4>
                            <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed">Rigorous veterinary screening and vaccination protocols for every puppy.</p>
                        </div>
                        <div class="pillar-card bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700 text-center">
                            <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="award" class="text-blue-600 w-8 h-8"></i>
                            </div>
                            <h4 class="serif text-2xl mb-4 text-[var(--mahogany)] dark:text-orange-400">Elite Pedigree</h4>
                            <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed">Parents are EAKC registered, ensuring pure genetic excellence.</p>
                        </div>
                        <div class="pillar-card bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-sm border border-gray-100 dark:border-slate-700 text-center">
                            <div class="w-16 h-16 bg-green-50 dark:bg-green-900/30 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                <i data-lucide="heart" class="text-green-600 w-8 h-8"></i>
                            </div>
                            <h4 class="serif text-2xl mb-4 text-[var(--mahogany)] dark:text-orange-400">Lifetime Support</h4>
                            <p class="text-gray-600 dark:text-gray-400 text-sm leading-relaxed">Dedicated guidance on nutrition and training for all our clients.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLegalPage() {
            return `
                <div class="max-w-4xl mx-auto py-10 md:py-20 px-4">
                    <header class="text-center mb-12 md:mb-16">
                        <h2 class="serif text-4xl md:text-6xl font-bold mb-4 text-[var(--mahogany)] dark:text-orange-500">Legal & Privacy Hub</h2>
                        <div class="h-1 w-24 bg-[var(--forest-green)] mx-auto rounded-full"></div>
                    </header>

                    <div class="flex justify-center border-b border-gray-200 dark:border-slate-700 mb-10 md:mb-14">
                        <button onclick="window.openLegalTab(event, 'terms')" class="legal-tab-button active py-4 px-8 md:px-12 text-sm uppercase tracking-wider dark:text-gray-400">Terms & Conditions</button>
                        <button onclick="window.openLegalTab(event, 'privacy')" class="legal-tab-button py-4 px-8 md:px-12 text-sm uppercase tracking-wider dark:text-gray-400">Privacy Policy</button>
                    </div>

                    <div id="terms" class="tab-content active bg-white dark:bg-slate-800 p-8 md:p-12 rounded-xl shadow-lg border-t-4" style="border-top-color: var(--forest-green);">
                        <h3 class="text-3xl font-bold mb-8 text-center dark:text-white" style="color: var(--mahogany);">Terms and Conditions</h3>
                        <div class="space-y-8 text-gray-700 dark:text-gray-300 leading-relaxed text-sm md:text-base">
                            <section>
                                <h4 class="text-xl font-bold mb-3 section-header">1. Legal Ownership & Animal Welfare</h4>
                                <p class="mb-4">In accordance with the <strong>Constitution of Kenya</strong> and the <strong>Prevention of Cruelty to Animals Act (Cap 360)</strong>, owning a dog is a significant legal responsibility.</p>
                            </section>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAdminAuth() {
            return `
                <div class="max-w-md mx-auto bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl mt-10">
                    <h2 class="text-2xl font-bold mb-6 text-center dark:text-white">Admin Access</h2>
                    <input type="email" id="admin-email" placeholder="Email" class="w-full p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg mb-4 text-sm">
                    <input type="password" id="admin-password" placeholder="Password" class="w-full p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg mb-6 text-sm">
                    <button onclick="window.handleAdminLogin()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-lg hover:bg-orange-700 transition">Login</button>
                </div>
            `;
        }

        window.handleAdminLogin = () => {
            const email = document.getElementById('admin-email').value;
            const pass = document.getElementById('admin-password').value;
            if (email === GOOGLE_CLOUD_CONFIG.adminEmail && pass === GOOGLE_CLOUD_CONFIG.adminPassword) {
                window.isAdminAuthenticated = true;
                window.appNavigate('admin');
            } else {
                window.showModal("Login Failed", "Incorrect credentials provided.");
            }
        };

        function renderAdminPanel() {
            const contentDiv = document.getElementById('main-content');
            contentDiv.innerHTML = `
                <div class="max-w-4xl mx-auto px-2">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <h2 class="text-2xl md:text-3xl font-bold dark:text-white">Admin Panel</h2>
                        <div class="flex space-x-3 w-full md:w-auto">
                            <button onclick="window.downloadBreedsJSON()" class="flex-1 md:flex-none bg-blue-600 text-white px-4 py-2 rounded-lg font-bold flex items-center justify-center text-xs"><i data-lucide="download" class="w-4 h-4 mr-2"></i>Download JSON</button>
                            <button onclick="window.isAdminAuthenticated=false; window.appNavigate('home')" class="flex-1 md:flex-none text-red-600 font-semibold border border-red-200 px-4 py-2 rounded-lg text-xs">Logout</button>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 p-4 md:p-6 rounded-2xl shadow-lg border-t-4 border-orange-500 mb-8 transition-colors">
                        <h3 class="text-lg md:text-xl font-bold mb-6 dark:text-white">Add/Edit Breed Listing</h3>
                        <form id="add-breed-form" class="space-y-4">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <select id="b-name" class="p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm" required>
                                    <option value="" disabled selected>Select Breed</option>
                                    ${WORLD_BREEDS.map(breed => `<option value="${breed}">${breed}</option>`).join('')}
                                </select>
                                <input type="number" id="b-price" placeholder="Price (KES)" class="p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm" required>
                                <input type="text" id="b-age" placeholder="Age (e.g. 3 Months)" class="p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                                <select id="b-gender" class="p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                                <input type="text" id="b-purity" placeholder="Purity (e.g. Purebred)" class="p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                                <select id="b-status" class="p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg text-sm">
                                    <option value="Available">Available</option>
                                    <option value="Reserved">Reserved</option>
                                    <option value="Sold">Sold</option>
                                </select>
                            </div>
                            <textarea id="b-desc" placeholder="Full Description" class="w-full p-3 border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded-lg h-32 text-sm" required></textarea>
                            <div class="space-y-2">
                                <p class="text-xs font-bold text-gray-500">Image URLs (Up to 8)</p>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-2" id="image-inputs-container">
                                    ${[...Array(8)].map((_, i) => `<input type="text" class="b-img-url p-2 text-xs border dark:border-slate-700 dark:bg-slate-700 dark:text-white rounded" placeholder="Image URL ${i+1}">`).join('')}
                                </div>
                            </div>
                            <button type="button" onclick="window.saveNewBreed()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition text-sm">Save to List</button>
                        </form>
                    </div>
                    <div id="admin-breeds-list" class="space-y-4"></div>
                </div>
            `;
            renderAdminBreedsList();
            lucide.createIcons();
        }

        function renderAdminBreedsList() {
            const container = document.getElementById('admin-breeds-list');
            if (window.breeds.length === 0) { container.innerHTML = '<p class="text-center text-sm dark:text-white">No breeds in database.</p>'; return; }
            container.innerHTML = `<h3 class="text-lg font-bold mb-4 dark:text-white">Current Listings</h3>` + window.breeds.map(b => `
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl shadow border dark:border-slate-700 flex justify-between items-center transition-colors">
                    <div>
                        <p class="font-bold text-sm md:text-base dark:text-white">${b.breed}</p>
                        <p class="text-[10px] md:text-sm text-gray-500 dark:text-gray-400">KES ${b.price.toLocaleString()} | ${b.status || 'Available'} | ID: ${b.id}</p>
                    </div>
                    <button onclick="window.deleteBreed(${b.id})" class="text-red-500 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.saveNewBreed = () => {
            const breedVal = document.getElementById('b-name').value;
            const imgInputs = document.querySelectorAll('.b-img-url');
            const images = Array.from(imgInputs).map(i => i.value).filter(v => v.trim() !== "");
            
            if (!breedVal) { window.showModal("Error", "Please select a breed."); return; }
            if (images.length === 0) { window.showModal("Error", "At least one image URL is required."); return; }

            const newBreed = {
                id: Date.now(),
                breed: breedVal,
                price: parseInt(document.getElementById('b-price').value),
                description: document.getElementById('b-desc').value,
                age: document.getElementById('b-age').value,
                gender: document.getElementById('b-gender').value,
                purity: document.getElementById('b-purity').value,
                status: document.getElementById('b-status').value,
                images: images
            };

            window.breeds.push(newBreed);
            localStorage.setItem('classdogs_breeds', JSON.stringify(window.breeds));
            window.showModal("Success", "Listing added locally. Click 'Download JSON' to export.");
            renderAdminPanel();
        };

        window.deleteBreed = (id) => {
            if(confirm("Are you sure you want to delete this listing?")) {
                window.breeds = window.breeds.filter(b => b.id !== id);
                localStorage.setItem('classdogs_breeds', JSON.stringify(window.breeds));
                renderAdminPanel();
            }
        };

        window.downloadBreedsJSON = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(window.breeds, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "breed.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        window.showModal = (title, body) => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerText = body;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        };

        window.closeModal = () => {
            const modal = document.getElementById('custom-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        window.startGallerySlideshow = () => {
            const slideshow = document.getElementById('gallery-slideshow');
            if (!slideshow) return;
            let current = 0;
            const items = slideshow.children.length;
            slideshow.style.width = `${items * 100}%`;
            Array.from(slideshow.children).forEach(child => child.style.width = `${100 / items}%`);
            window.changeGallerySlide = (dir) => {
                current = (current + dir + items) % items;
                slideshow.style.transform = `translateX(-${current * (100 / items)}%)`;
            };
            if(window.galInt) clearInterval(window.galInt);
            window.galInt = setInterval(() => { if(!window.galleryPaused) window.changeGallerySlide(1); }, 4000);
        };

        window.startChampionSlideshow = () => {
            const slideshow = document.getElementById('champ-slideshow');
            if (!slideshow) return;
            let current = 0;
            const items = slideshow.children.length;
            slideshow.style.width = `${items * 100}%`;
            Array.from(slideshow.children).forEach(child => child.style.width = `${100 / items}%`);
            window.changeChampSlide = (dir) => {
                current = (current + dir + items) % items;
                slideshow.style.transform = `translateX(-${current * (100 / items)}%)`;
            };
            if(window.champInt) clearInterval(window.champInt);
            window.champInt = setInterval(() => { if(!window.champPaused) window.changeChampSlide(1); }, 6000);
        };

        window.openLegalTab = (evt, name) => {
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelectorAll('.legal-tab-button').forEach(tb => tb.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
        };

        window.handleLogoClick = () => { if(++window.logoClicks >= 5) document.getElementById('nav-admin-btn').classList.remove('hidden'); };

        window.addEventListener('hashchange', () => {
            const currentHash = window.location.hash.replace('#', '') || 'home';
            window.appNavigate(currentHash);
        });

        window.onload = loadDataFromCloud;
    </script>
</body>
</html>
